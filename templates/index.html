<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Chat Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #F7F4EF;
    --surface: #FFFFFF;
    --border: #E2DDD5;
    --text: #1A1714;
    --muted: #9A9189;
    --accent: #C84B31;
    --accent-light: #FDF0ED;
    --user-bg: #1A1714;
    --user-text: #F7F4EF;
    --ai-bg: #FFFFFF;
    --shadow: 0 2px 16px rgba(26,23,20,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Instrument Sans', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.4;
    pointer-events: none; z-index: 0;
  }

  /* ── Header ── */
  header {
    position: relative; z-index: 10;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 28px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: var(--shadow);
  }

  .logo {
    width: 40px; height: 40px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }

  .brand h1 {
    font-family: 'Syne', sans-serif;
    font-size: 20px; font-weight: 800;
    color: var(--text); letter-spacing: -0.5px;
  }

  .brand p { font-size: 12px; color: var(--muted); margin-top: 1px; }

  .header-right {
    margin-left: auto;
    display: flex; align-items: center; gap: 8px;
  }

  .live-pill {
    background: #EDFAF3; border: 1px solid #A8DFBE;
    color: #1E8A4C; border-radius: 20px;
    padding: 4px 12px; font-size: 12px; font-weight: 500;
    display: flex; align-items: center; gap: 5px;
  }

  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #1E8A4C; animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── Messages ── */
  #messages {
    flex: 1; overflow-y: auto;
    padding: 28px 24px;
    display: flex; flex-direction: column; gap: 20px;
    position: relative; z-index: 1;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 5px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    display: flex; gap: 12px;
    max-width: 800px; width: 100%;
    animation: slideIn 0.25s ease;
  }

  @keyframes slideIn {
    from { opacity:0; transform:translateY(8px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.ai   { align-self: flex-start; }

  .avatar {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; flex-shrink: 0; margin-top: 2px;
    font-family: 'Syne', sans-serif; font-weight: 700;
  }

  .msg.ai .avatar   { background: var(--accent); color: white; font-size: 13px; }
  .msg.user .avatar { background: var(--user-bg); color: var(--user-text); font-size: 13px; }

  .bubble {
    padding: 13px 17px; border-radius: 16px;
    font-size: 14.5px; line-height: 1.65;
    max-width: calc(100% - 52px);
    white-space: pre-wrap; word-break: break-word;
  }

  .msg.user .bubble {
    background: var(--user-bg); color: var(--user-text);
    border-bottom-right-radius: 4px;
  }

  .msg.ai .bubble {
    background: var(--ai-bg); color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    box-shadow: var(--shadow);
  }

  /* ── Typing ── */
  .typing-dots { display:flex; gap:5px; align-items:center; padding:3px 0; }
  .typing-dots span {
    width:8px; height:8px; border-radius:50%;
    background: var(--accent); animation: bop 1.2s infinite;
  }
  .typing-dots span:nth-child(2){ animation-delay:.2s }
  .typing-dots span:nth-child(3){ animation-delay:.4s }

  @keyframes bop {
    0%,80%,100%{ transform:translateY(0); opacity:0.3 }
    40%{ transform:translateY(-7px); opacity:1 }
  }

  /* ── Suggestions ── */
  .suggestions {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding: 0 24px 14px;
    position: relative; z-index: 1;
  }

  .sugg-btn {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 7px 15px; border-radius: 20px;
    font-size: 13px; cursor: pointer; transition: all 0.18s;
    font-family: 'Instrument Sans', sans-serif;
  }

  .sugg-btn:hover {
    background: var(--accent-light);
    border-color: var(--accent); color: var(--accent);
  }

  /* ── Input bar ── */
  .input-wrap {
    position: relative; z-index: 10;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 16px 24px;
    display: flex; gap: 10px; align-items: flex-end;
    box-shadow: 0 -2px 12px rgba(26,23,20,0.06);
  }

  #userInput {
    flex: 1; background: var(--bg);
    border: 1.5px solid var(--border); border-radius: 14px;
    padding: 13px 17px; color: var(--text);
    font-size: 14.5px; font-family: 'Instrument Sans', sans-serif;
    resize: none; max-height: 130px; outline: none;
    transition: border-color 0.2s; line-height: 1.5;
  }

  #userInput:focus { border-color: var(--accent); }
  #userInput::placeholder { color: var(--muted); }

  #sendBtn {
    background: var(--accent); border: none; border-radius: 14px;
    width: 48px; height: 48px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s; flex-shrink: 0;
  }

  #sendBtn:hover { background: #a83a22; transform: scale(1.06); }
  #sendBtn:disabled { background: var(--border); cursor: not-allowed; transform: none; }
  #sendBtn svg { width: 20px; height: 20px; fill: white; }

  .char-hint { font-size: 11px; color: var(--muted); text-align: center; padding-bottom: 6px; }

  /* ── Welcome ── */
  .welcome {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 18px; padding: 22px 24px;
    max-width: 480px; box-shadow: var(--shadow);
  }

  .welcome h2 {
    font-family: 'Syne', sans-serif; font-size: 20px;
    font-weight: 800; color: var(--text);
    letter-spacing: -0.4px; margin-bottom: 8px;
  }

  .welcome p { font-size: 13.5px; color: var(--muted); line-height: 1.6; }

  .powered {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--accent-light); border: 1px solid #F5C5B8;
    color: var(--accent); border-radius: 10px;
    padding: 3px 10px; font-size: 11px; font-weight: 500;
    margin-top: 10px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">🤖</div>
  <div class="brand">
    <h1>AI Assistant</h1>
    <p>Powered by Google Gemini</p>
  </div>
  <div class="header-right">
    <div class="live-pill"><div class="live-dot"></div> Live</div>
  </div>
</header>

<div id="messages">
  <div class="msg ai">
    <div class="avatar">AI</div>
    <div class="bubble">
      <div class="welcome">
        <h2>Hello! 👋 How can I help?</h2>
        <p>I'm an AI assistant ready to answer your questions, help with ideas, explain concepts, or just have a conversation.</p>
        <span class="powered">⚡ Google Gemini 2.0 Flash</span>
      </div>
    </div>
  </div>
</div>

<div class="suggestions" id="suggestions">
  <button class="sugg-btn" onclick="suggest(this)">💡 Explain machine learning</button>
  <button class="sugg-btn" onclick="suggest(this)">✍️ Write a short poem</button>
  <button class="sugg-btn" onclick="suggest(this)">🌍 Fun facts about space</button>
  <button class="sugg-btn" onclick="suggest(this)">🍕 Quick pasta recipe</button>
</div>

<div class="input-wrap">
  <textarea id="userInput" rows="1" placeholder="Type your message..."></textarea>
  <button id="sendBtn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
  </button>
</div>
<p class="char-hint">Press Enter to send · Shift+Enter for new line</p>

<script>
  let history = [];

  function suggest(btn) {
    document.getElementById('userInput').value = btn.textContent.slice(2).trim();
    document.getElementById('suggestions').style.display = 'none';
    sendMessage();
  }

  const ta = document.getElementById('userInput');
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 130) + 'px';
  });
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function addMessage(role, text) {
    const wrap = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const av = document.createElement('div');
    av.className = 'avatar';
    av.textContent = role === 'ai' ? 'AI' : 'You';
    const bub = document.createElement('div');
    bub.className = 'bubble';
    bub.textContent = text;
    div.appendChild(av);
    div.appendChild(bub);
    wrap.appendChild(div);
    wrap.scrollTop = wrap.scrollHeight;
    return bub;
  }

  function showTyping() {
    const wrap = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg ai'; div.id = 'typing';
    const av = document.createElement('div');
    av.className = 'avatar'; av.textContent = 'AI';
    const bub = document.createElement('div');
    bub.className = 'bubble';
    bub.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
    div.appendChild(av); div.appendChild(bub);
    wrap.appendChild(div);
    wrap.scrollTop = wrap.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    addMessage('user', text);
    history.push({ role: 'user', content: text });

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('suggestions').style.display = 'none';
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });

      const data = await res.json();
      removeTyping();

      if (!res.ok) {
        addMessage('ai', `⚠️ Error: ${data.error}`);
        history.pop();
        return;
      }

      addMessage('ai', data.reply);
      history.push({ role: 'model', content: data.reply });

    } catch (err) {
      removeTyping();
      addMessage('ai', '⚠️ Could not reach the server. Please try again.');
      history.pop();
    } finally {
      document.getElementById('sendBtn').disabled = false;
      input.focus();
    }
  }
</script>
</body>
</html>
